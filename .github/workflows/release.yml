name: Release Build

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Build frontend
        run: yarn build

      - name: Build Tauri app
        run: tauri build --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: easydb-${{ matrix.platform }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
          retention-days: 30

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: |
            ./artifacts/**/*/*.dmg
            ./artifacts/**/*/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: create-release
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Download macOS build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: easydb-macos-*
          merge-multiple: true
          path: ./dmg-artifacts

      - name: Locate DMG files
        id: dmgs
        run: |
          ARM64_DMG="$(find ./dmg-artifacts -name '*aarch64*.dmg' | head -1)"
          X64_DMG="$(find ./dmg-artifacts -name '*x64*.dmg' ! -name '*setup*' | head -1)"

          if [[ -z "$ARM64_DMG" || -z "$X64_DMG" ]]; then
            echo "Failed to locate macOS DMG artifacts"
            find ./dmg-artifacts -type f
            exit 1
          fi

          echo "arm64=$ARM64_DMG" >> "$GITHUB_OUTPUT"
          echo "x64=$X64_DMG" >> "$GITHUB_OUTPUT"

      - name: Generate Homebrew cask
        run: |
          ./scripts/generate-homebrew-cask.sh \
            "$VERSION" \
            "${{ steps.dmgs.outputs.arm64 }}" \
            "${{ steps.dmgs.outputs.x64 }}" \
            homebrew/Casks/easydb.rb

      - name: Publish Homebrew checksums
        run: |
          SHA256_ARM64="$(shasum -a 256 "${{ steps.dmgs.outputs.arm64 }}" | awk '{print $1}')"
          SHA256_X64="$(shasum -a 256 "${{ steps.dmgs.outputs.x64 }}" | awk '{print $1}')"
          {
            echo "## Homebrew cask checksums"
            echo ""
            echo "- version: \`$VERSION\`"
            echo "- arm64: \`$SHA256_ARM64\`"
            echo "- x64: \`$SHA256_X64\`"
            echo ""
            echo "Install via tap:"
            echo "\`brew install --cask shencangsheng/easydb/easydb\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Update personal Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set, skipping personal tap update"
            exit 0
          fi

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/shencangsheng/homebrew-easydb.git" tap
          mkdir -p tap/Casks
          cp homebrew/Casks/easydb.rb tap/Casks/easydb.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "Homebrew tap already up to date"
            exit 0
          fi

          git add Casks/easydb.rb
          git commit -m "Update easydb to ${VERSION}"
          git push origin HEAD:main

      - name: Bump official Homebrew cask
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
          HOMEBREW_NO_INSTALL_FROM_API: "1"
        run: |
          if [ -z "$HOMEBREW_GITHUB_API_TOKEN" ]; then
            echo "HOMEBREW_GITHUB_API_TOKEN not set, skipping official cask bump"
            exit 0
          fi

          SHA256_ARM64="$(grep 'sha256 arm:' -A1 homebrew/Casks/easydb.rb | tail -1 | sed -n 's/.*"\([a-f0-9]\{64\}\)".*/\1/p')"
          SHA256_X64="$(grep 'intel:' homebrew/Casks/easydb.rb | sed -n 's/.*"\([a-f0-9]\{64\}\)".*/\1/p')"

          brew bump-cask-pr easydb \
            --version="${VERSION}" \
            --sha256="arm64:${SHA256_ARM64},intel:${SHA256_X64}" \
            --write-only

          echo "Opened bump PR for official homebrew-cask easydb ${VERSION}"
